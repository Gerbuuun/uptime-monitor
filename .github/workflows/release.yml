name: Publish npm package and GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify that the tag matches package.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "$TAG" = "v$VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test and type-check
        run: |
          pnpm test
          pnpm typecheck

      - name: Publish to npm when needed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published to npm."
          else
            pnpm publish --no-git-checks
          fi

      - name: Create the GitHub Release when needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists."
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
